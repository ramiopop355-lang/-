kind = "web"
previewPath = "/"
title = "الشيخ ذكي - مختبر التصحيح"
version = "1.0.0"
id = "artifacts/sheikh-dhaki"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25679

[services.development]
run = "pnpm --filter @workspace/sheikh-dhaki run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sheikh-dhaki", "run", "build" ]
publicDir = "artifacts/sheikh-dhaki/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25679"
BASE_PATH = "/"
